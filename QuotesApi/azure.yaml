# azure.yaml — Azure Developer CLI (azd) service manifest
#
# This file is the single entry point for `azd`. It describes:
#   1. What services live in this repository
#   2. Where each service's source code is
#   3. What Azure host type to deploy to
#   4. Where the Bicep infrastructure templates are
#
# ── How `azd up` orchestrates the full deployment ────────────────────────────
#
#   Phase 1 — Provision  (reads infra/main.bicep)
#     azd creates/updates all Azure resources defined in Bicep:
#     Log Analytics → Container Apps Environment → ACR → Managed Identity
#     → RBAC assignments → Container App (with a placeholder image)
#
#   Phase 2 — Build
#     azd runs: dotnet publish --os linux --arch x64 /t:PublishContainer
#     The .NET 10 SDK builds the OCI image without a Dockerfile.
#     No Docker daemon on the developer machine is needed for the build itself,
#     but Docker must be running to push to ACR.
#
#   Phase 3 — Push
#     azd reads AZURE_CONTAINER_REGISTRY_ENDPOINT from Bicep outputs,
#     tags the image as:  <acr-server>/quotes-api:<env>-<git-sha>
#     and pushes it to the ACR provisioned in Phase 1.
#
#   Phase 4 — Deploy
#     azd reads SERVICE_QUOTES_API_RESOURCE_NAME from Bicep outputs,
#     updates the Container App's image reference to the newly pushed tag,
#     and waits for the new revision to become healthy.
#
# ── Reference ─────────────────────────────────────────────────────────────────
#   https://learn.microsoft.com/azure/developer/azure-developer-cli/azd-schema

name: quotes-api

# Where azd looks for Bicep templates.
# infra/ is the default, declared explicitly for clarity.
infra:
  provider: bicep
  path: infra

services:

  # ── quotes-api ──────────────────────────────────────────────────────────────
  # Service key — MUST match:
  #   • The 'azd-service-name: quotes-api' tag on the Container App in Bicep
  #   • The Bicep output SERVICE_QUOTES_API_RESOURCE_NAME
  # azd uses the tag to locate which Container App to update after image push.
  quotes-api:

    # Path to the .csproj file (relative to this azure.yaml).
    # azd passes this to `dotnet publish` during the Build phase.
    project: ./QuotesApi.csproj

    # language: dotnet tells azd to use the .NET SDK container publishing workflow:
    #   dotnet publish --os linux --arch x64 /t:PublishContainer
    # No Dockerfile is created or required. The SDK layers the published output
    # onto the base image specified in QuotesApi.csproj (ContainerBaseImage).
    language: dotnet

    # host: containerapp tells azd to:
    #   - Expect AZURE_CONTAINER_REGISTRY_ENDPOINT from Bicep outputs
    #   - Tag and push the built image to that ACR
    #   - Update the Container App identified by SERVICE_QUOTES_API_RESOURCE_NAME
    host: containerapp
