name: .NET CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.0.x

    - name: Restore QuotesApi
      run: dotnet restore QuotesApi/QuotesApi.csproj

    - name: Build QuotesApi
      run: dotnet build QuotesApi/QuotesApi.csproj --no-restore

    - name: Test QuotesApi
      run: dotnet test QuotesApi.Tests/QuotesApi.Tests.csproj --verbosity normal