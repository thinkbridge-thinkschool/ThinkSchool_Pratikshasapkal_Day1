name: Quotes API — CI

# Branch protection — required status checks for main:
#   Build | Unit Tests | Integration Tests — SQL Server (Testcontainers)
# Settings → Branches → Add rule → "main" → Require status checks to pass.
# Coverage below 70% (integration tests) also fails CI via coverlet.runsettings.

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: "10.0.x"
  DOTNET_NOLOGO: "true"
  DOTNET_CLI_TELEMETRY_OPTOUT: "true"

jobs:
  # Fast build gate — compilation failure cancels both test jobs immediately.
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Restore
        run: |
          dotnet restore Tests.Domain/Tests.Domain.csproj
          dotnet restore Quotes.Tests.Integration/Quotes.Tests.Integration.csproj

      - name: Build
        run: |
          dotnet build Tests.Domain/Tests.Domain.csproj --no-restore -c Release
          dotnet build Quotes.Tests.Integration/Quotes.Tests.Integration.csproj --no-restore -c Release

  # Domain-model unit tests — no Docker, no database.
  unit-tests:
    name: Unit Tests
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore Tests.Domain/Tests.Domain.csproj

      - name: Build
        run: dotnet build Tests.Domain/Tests.Domain.csproj --no-restore -c Release

      - name: Install ReportGenerator
        run: dotnet tool update -g dotnet-reportgenerator-globaltool

      - name: Test
        run: |
          dotnet test Tests.Domain/Tests.Domain.csproj \
            --no-build -c Release \
            --logger "trx;LogFileName=unit.trx" \
            --logger "console;verbosity=detailed" \
            --collect:"XPlat Code Coverage" \
            --results-directory "${{ github.workspace }}/test-results/unit"

      - name: Generate coverage report
        if: always()
        run: |
          reportgenerator \
            -reports:"${{ github.workspace }}/test-results/unit/**/coverage.cobertura.xml" \
            -targetdir:"${{ github.workspace }}/test-results/unit/coverage-report" \
            -reporttypes:"Html;Badges;TextSummary"
          cat "${{ github.workspace }}/test-results/unit/coverage-report/Summary.txt"

      - name: Upload test results and coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results-${{ github.run_number }}
          path: ${{ github.workspace }}/test-results/unit/
          retention-days: 30

  # Full HTTP stack against a real SQL Server 2022 container (Testcontainers).
  # coverlet.runsettings enforces 70% line coverage — fails CI if below threshold.
  integration-tests:
    name: Integration Tests — SQL Server (Testcontainers)
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore Quotes.Tests.Integration/Quotes.Tests.Integration.csproj

      - name: Build
        run: dotnet build Quotes.Tests.Integration/Quotes.Tests.Integration.csproj --no-restore -c Release

      - name: Pre-pull SQL Server 2022 image
        run: docker pull mcr.microsoft.com/mssql/server:2022-latest

      - name: Install ReportGenerator
        run: dotnet tool update -g dotnet-reportgenerator-globaltool

      # --logger "console;verbosity=detailed" streams every test name + result directly
      # to the GitHub Actions log so the mentor can see all 5 required scenarios pass.
      - name: Test
        run: |
          dotnet test Quotes.Tests.Integration/Quotes.Tests.Integration.csproj \
            --no-build -c Release \
            --logger "trx;LogFileName=integration.trx" \
            --logger "console;verbosity=detailed" \
            --collect:"XPlat Code Coverage" \
            --settings coverlet.runsettings \
            --results-directory "${{ github.workspace }}/test-results/integration" \
            --blame-hang-timeout 10m \
            --blame-crash
        env:
          DOCKER_HOST: unix:///var/run/docker.sock

      # Parses the TRX XML and prints an explicit pass/fail table for all five required
      # auth/authz scenarios. Fails CI if any required test is missing or did not pass.
      - name: "Verify required auth/authz scenario tests — Day 3 Piece 3"
        if: always()
        shell: python3 {0}
        run: |
          import xml.etree.ElementTree as ET, sys, os, glob

          ws      = os.environ.get("GITHUB_WORKSPACE", "")
          pattern = os.path.join(ws, "test-results", "integration", "*.trx")
          files   = glob.glob(pattern)

          REQUIRED = [
              "Anonymous_Request_Returns_401",
              "Authenticated_User_With_Wrong_Policy_Returns_403",
              "Authenticated_User_With_Valid_Policy_Returns_200",
              "Expired_Token_Returns_401",
              "Revoked_Refresh_Token_Chain_Returns_401",
          ]

          if not files:
              print(f"ERROR: No TRX file found at: {pattern}")
              print("       The Test step may have failed before producing output.")
              sys.exit(1)

          ns    = {"t": "http://microsoft.com/schemas/VisualStudio/TeamTest/2010"}
          found = {}

          for trx in files:
              tree = ET.parse(trx)
              for result in tree.getroot().findall(".//t:UnitTestResult", ns):
                  name    = result.get("testName", "")
                  outcome = result.get("outcome", "Unknown")
                  for req in REQUIRED:
                      if req in name:
                          found[req] = outcome

          SEP = "=" * 65
          print()
          print(SEP)
          print("  REQUIRED AUTH / AUTHZ SCENARIOS — DAY 3 PIECE 3")
          print(SEP)

          all_passed = True
          for req in REQUIRED:
              outcome = found.get(req, "NOT FOUND IN TEST RESULTS")
              marker  = "v" if outcome == "Passed" else "X"
              print(f"  [{marker}] {req}")
              print(f"       Status : {outcome}")
              if outcome != "Passed":
                  all_passed = False

          print(SEP)
          if all_passed:
              print("  [v] ALL 5 REQUIRED SCENARIOS PASSED — ready for mentor review")
          else:
              print("  [X] ONE OR MORE REQUIRED SCENARIOS FAILED OR ARE MISSING")
              print("      See the Test step output above for details.")
          print(SEP)
          print()

          sys.exit(0 if all_passed else 1)

      - name: Generate coverage report
        if: always()
        run: |
          reportgenerator \
            -reports:"${{ github.workspace }}/test-results/integration/**/coverage.cobertura.xml" \
            -targetdir:"${{ github.workspace }}/test-results/integration/coverage-report" \
            -reporttypes:"Html;Badges;TextSummary"
          cat "${{ github.workspace }}/test-results/integration/coverage-report/Summary.txt"

      - name: Upload test results and coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results-${{ github.run_number }}
          path: ${{ github.workspace }}/test-results/integration/
          retention-days: 30
